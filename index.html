<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gazette</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --paper-bg: #f9f7f1; /* Off-white newsprint color */
            --ink-black: #111111;
            --ink-gray: #444444;
            --divider: #cccccc;
        }

        body {
            font-family: 'Lora', serif;
            background-color: var(--paper-bg);
            color: var(--ink-black);
            margin: 0;
            padding: 0 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding-bottom: 50px;
        }

        /* --- MASTHEAD --- */
        header {
            text-align: center;
            padding: 30px 0 10px 0;
            margin-bottom: 5px;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 5rem;
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -2px;
            color: var(--ink-black);
        }

        .sub-masthead {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 2px solid var(--ink-black);
            border-bottom: 2px solid var(--ink-black);
            padding: 10px 0;
            font-family: sans-serif;
            font-size: 0.85rem;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        /* --- CONTROLS --- */
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select, button {
            padding: 5px 10px;
            border: 1px solid var(--ink-black);
            background: transparent;
            font-family: sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            cursor: pointer;
        }

        button {
            background-color: var(--ink-black);
            color: var(--paper-bg);
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--ink-gray);
        }

        .hidden { display: none !important; }

        /* --- NEWSPAPER GRID --- */
        .news-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            align-items: start;
        }

        /* --- ARTICLE CARDS --- */
        .news-card {
            border-bottom: 1px solid var(--divider);
            padding-bottom: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            transition: opacity 0.2s;
        }

        .news-card:hover {
            opacity: 0.7;
        }

        /* Make the first article larger and span multiple columns */
        .news-card.featured {
            grid-column: 1 / -1;
            border-bottom: 3px double var(--ink-black);
            margin-bottom: 10px;
            text-align: center;
        }

        .news-card.featured h3 {
            font-size: 3rem;
            margin: 15px 0;
        }

        @media (min-width: 768px) {
            .news-card.featured {
                grid-column: span 2;
                text-align: left;
            }
        }

        .source-tag {
            font-family: sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            color: #d32f2f; /* Classic dark red newspaper accent */
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .news-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            line-height: 1.2;
            margin: 0 0 10px 0;
            color: var(--ink-black);
        }

        .read-more {
            font-family: sans-serif;
            font-size: 0.8rem;
            font-style: italic;
            color: var(--ink-gray);
            margin-top: auto;
        }

        /* --- MODAL FOR READING --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex; justify-content: center; align-items: flex-start;
            z-index: 1000;
            padding-top: 5vh;
        }

        .modal-content {
            background: var(--paper-bg); 
            padding: 40px 60px; 
            max-width: 800px; 
            width: 90%; 
            max-height: 85vh; 
            overflow-y: auto;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            line-height: 1.2;
            border-bottom: 1px solid var(--ink-black);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .modal-content p {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .close-btn {
            position: absolute; top: 15px; right: 20px;
            font-size: 2rem; cursor: pointer; color: var(--ink-black);
            background: none; border: none; padding: 0;
            line-height: 1;
        }

        /* Drop cap for modal articles */
        #modalBody > p:first-of-type::first-letter {
            float: left;
            font-size: 4rem;
            line-height: 0.8;
            padding-right: 8px;
            padding-top: 5px;
            font-family: 'Playfair Display', serif;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>The Gazette</h1>
    </header>

    <div class="sub-masthead">
        <div id="todaysDate">Date goes here</div>
        
        <div class="controls">
            <select id="languageFilter">
                <option value="en">English</option>
                <option value="hi">Hindi</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
            </select>

            <select id="locationFilter">
                <option value="world">World</option>
                <option value="country">Country (India)</option>
                <option value="states">States</option>
                <option value="district">District (Howrah)</option>
            </select>

            <select id="stateSelect" class="hidden">
                <option value="">-- State --</option>
                <option value="west-bengal">West Bengal</option>
                <option value="maharashtra">Maharashtra</option>
                <option value="karnataka">Karnataka</option>
                <option value="delhi">Delhi</option>
            </select>

            <button onclick="fetchNews()">Update</button>
        </div>
    </div>

    <div class="news-container" id="newsContainer">
        </div>
</div>

<div id="articleModal" class="modal-overlay hidden">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal()">×</button>
        <h2 id="modalTitle"></h2>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    // Set today's date in the masthead
    const dateElement = document.getElementById('todaysDate');
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    dateElement.innerText = new Date().toLocaleDateString('en-US', options);

    // --- API KEYS ---
    const GUARDIAN_KEY = '99faa72a-bd14-4fea-8d09-5200ff1e3c53';
    const NEWSAPI_KEY = '88bc6bb21b064798b76b042d38c70dd2';
    const GNEWS_KEY = '8d2a825a10e2836e5c8a26affa038680';
    const NEWSDATA_KEY = 'pub_9410f56733d649d0bd05e1204efae7ee';
    const CURRENTS_KEY = 'ZSiD8EbjAqlidDAA0wxOu3Dn2i5C9wRazO7i-Xave-kk4s-g';

    const locationFilter = document.getElementById('locationFilter');
    const stateSelect = document.getElementById('stateSelect');
    const newsContainer = document.getElementById('newsContainer');
    const articleModal = document.getElementById('articleModal');
    
    // Toggle State Dropdown Visibility
    locationFilter.addEventListener('change', (e) => {
        if (e.target.value === 'states') {
            stateSelect.classList.remove('hidden');
        } else {
            stateSelect.classList.add('hidden');
            stateSelect.value = '';
        }
    });

    // --- MAIN FETCH ORCHESTRATOR ---
    async function fetchNews() {
        newsContainer.innerHTML = '<p style="font-style: italic; grid-column: 1/-1; text-align: center;">Gathering the latest reports via telegraph...</p>';
        const lang = document.getElementById('languageFilter').value;
        const scope = locationFilter.value;
        const state = stateSelect.value;
        
        let query = scope;
        if (scope === 'world') query = 'global';
        if (scope === 'country') query = 'India';
        if (scope === 'states' && state) query = state.replace('-', ' ');
        if (scope === 'district') query = 'Howrah';

        const results = await Promise.allSettled([
            fetchGuardian(query),
            fetchNewsAPI(query, lang),
            fetchGNews(query, lang),
            fetchNewsData(query, lang),
            fetchCurrents(query, lang)
        ]);

        const allArticles = results
            .filter(result => result.status === 'fulfilled')
            .map(result => result.value)
            .flat();

        renderNews(allArticles);
    }

    // --- INDIVIDUAL API FETCHERS ---

    async function fetchGuardian(query) {
        const url = `https://content.guardianapis.com/search?q=${query}&show-fields=body&api-key=${GUARDIAN_KEY}`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            if (!data.response || !data.response.results) return [];
            return data.response.results.map(article => ({
                title: article.webTitle,
                source: 'The Guardian',
                url: article.webUrl,
                fullText: article.fields?.body || 'Full text not available.',
                isGuardian: true
            }));
        } catch (e) { return []; }
    }

    async function fetchNewsAPI(query, lang) {
        const url = `https://newsapi.org/v2/everything?q=${query}&language=${lang}&apiKey=${NEWSAPI_KEY}`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            if (!data.articles) return [];
            return data.articles.map(article => ({
                title: article.title,
                source: article.source?.name || 'NewsAPI',
                url: article.url,
                fullText: null, 
                isGuardian: false
            }));
        } catch (e) { return []; }
    }

    async function fetchGNews(query, lang) {
        const url = `https://gnews.io/api/v4/search?q=${query}&lang=${lang}&apikey=${GNEWS_KEY}`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            if (!data.articles) return [];
            return data.articles.map(article => ({
                title: article.title,
                source: article.source?.name || 'GNews',
                url: article.url,
                fullText: null,
                isGuardian: false
            }));
        } catch (e) { return []; }
    }

    async function fetchNewsData(query, lang) {
        const url = `https://newsdata.io/api/1/news?apikey=${NEWSDATA_KEY}&q=${query}&language=${lang}`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            if (!data.results) return [];
            return data.results.map(article => ({
                title: article.title,
                source: article.source_id || 'NewsData.io',
                url: article.link,
                fullText: null,
                isGuardian: false
            }));
        } catch (e) { return []; }
    }

    async function fetchCurrents(query, lang) {
        const url = `https://api.currentsapi.services/v1/search?keywords=${query}&language=${lang}&apiKey=${CURRENTS_KEY}`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            if (!data.news) return [];
            return data.news.map(article => ({
                title: article.title,
                source: article.author || 'Currents API',
                url: article.url,
                fullText: null,
                isGuardian: false
            }));
        } catch (e) { return []; }
    }

    // --- RENDER LOGIC ---
    function renderNews(articles) {
        newsContainer.innerHTML = '';
        
        const uniqueArticles = Array.from(new Map(articles.filter(a => a && a.title).map(a => [a.title, a])).values());

        if (uniqueArticles.length === 0) {
            newsContainer.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">No dispatches found for this criteria.</p>';
            return;
        }

        uniqueArticles.sort(() => Math.random() - 0.5);

        uniqueArticles.forEach((article, index) => {
            const card = document.createElement('div');
            // Give the first article a featured treatment
            card.className = index === 0 ? 'news-card featured' : 'news-card';
            
            card.innerHTML = `
                <div class="source-tag">${article.source}</div>
                <h3>${article.title}</h3>
                <span class="read-more">
                    ${article.isGuardian ? 'Turn to page ↗' : 'Read original dispatch ↗'}
                </span>
            `;

            card.addEventListener('click', () => {
                if (article.isGuardian) {
                    openModal(article.title, article.fullText);
                } else {
                    window.open(article.url, '_blank');
                }
            });

            newsContainer.appendChild(card);
        });
    }

    // --- MODAL LOGIC ---
    function openModal(title, htmlBody) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerHTML = htmlBody;
        articleModal.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        articleModal.classList.add('hidden');
        document.getElementById('modalBody').innerHTML = '';
        document.body.style.overflow = 'auto';
    }

    // Load default news on initial load
    window.onload = fetchNews;
</script>

</body>
</html>
