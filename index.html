<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Daily Gazette | India Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Source+Serif+4:wght@400;700&display=swap');
        body { font-family: 'Source Serif 4', serif; }
        .newspaper-title { font-family: 'Playfair Display', serif; }
        
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .animate-marquee {
            display: inline-block;
            animation: marquee 25s linear infinite;
        }
        .category-btn.active {
            text-decoration: underline;
            text-underline-offset: 8px;
            color: #b91c1c; /* Red-700 */
        }
    </style>
</head>
<body class="bg-[#fcfaf5] text-stone-900">
    <div class="bg-red-700 text-white py-2 overflow-hidden border-b border-black">
        <div id="breaking-ticker" class="animate-marquee uppercase font-bold text-sm tracking-widest whitespace-nowrap">
            Fetching the latest headlines from across the globe...
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-4 py-6">
        <header class="text-center border-b-4 border-double border-stone-800 pb-4 mb-4">
            <h1 class="newspaper-title text-6xl md:text-8xl font-black uppercase tracking-tighter">LATEST NEWSPAPER</h1>
            <div class="flex justify-between mt-4 font-bold text-xs uppercase border-t border-stone-300 pt-2 italic">
                <span>New Delhi // Mumbai // Bengaluru</span>
                <span id="current-date"></span>
                <span>Edition: Digital India</span>
            </div>
        </header>

        <nav class="flex flex-wrap justify-center gap-6 mb-8 py-2 border-b border-stone-300 font-bold uppercase text-sm tracking-widest">
            <button class="category-btn active hover:text-red-700 transition" data-category="general">General</button>
            <button class="category-btn hover:text-red-700 transition" data-category="world">International</button>
            <button class="category-btn hover:text-red-700 transition" data-category="nation">Country</button>
            <button class="category-btn hover:text-red-700 transition" data-category="sports">Sports</button>
            <button class="category-btn hover:text-red-700 transition" data-category="technology">Tech</button>
            <button class="category-btn hover:text-red-700 transition" data-category="business">Business</button>
            <button class="category-btn hover:text-red-700 transition" data-category="entertainment">Lifestyle</button>
        </nav>

        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-3 gap-10">
            </div>

        <div class="flex justify-center gap-4 mt-12 mb-20">
            <button id="prev-btn" class="px-6 py-2 border-2 border-stone-800 font-bold hover:bg-stone-800 hover:text-white transition disabled:opacity-30" disabled>← Previous</button>
            <span id="page-num" class="flex items-center font-bold">PAGE 1</span>
