<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Daily Gazette | India Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Source+Serif+4:wght@400;700&display=swap');
        body { font-family: 'Source Serif 4', serif; background-color: #fcfaf5; }
        .newspaper-title { font-family: 'Playfair Display', serif; }
        
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .animate-marquee {
            display: inline-block;
            animation: marquee 25s linear infinite;
        }
        .category-btn.active {
            border-bottom: 2px solid #b91c1c;
            color: #b91c1c;
        }
    </style>
</head>
<body class="text-stone-900">
    <div class="bg-red-700 text-white py-2 overflow-hidden border-b border-black">
        <div id="breaking-ticker" class="animate-marquee uppercase font-bold text-sm tracking-widest whitespace-nowrap">
            Loading today's headlines...
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-4 py-6">
        <header class="text-center border-b-4 border-double border-stone-800 pb-4 mb-4">
            <h1 class="newspaper-title text-6xl md:text-8xl font-black uppercase tracking-tighter">LATEST NEWSPAPER</h1>
            <div class="flex justify-between mt-4 font-bold text-xs uppercase border-t border-stone-300 pt-2 italic">
                <span>New Delhi // Mumbai // Bengaluru</span>
                <span id="current-date"></span>
                <span>Edition: Digital India</span>
            </div>
        </header>

        <nav class="flex flex-wrap justify-center gap-4 md:gap-8 mb-8 py-2 border-b border-stone-300 font-bold uppercase text-xs md:text-sm tracking-widest">
            <button class="category-btn active px-2 pb-1" data-category="general">General</button>
            <button class="category-btn px-2 pb-1" data-category="world">World</button>
            <button class="category-btn px-2 pb-1" data-category="nation">Nation</button>
            <button class="category-btn px-2 pb-1" data-category="sports">Sports</button>
            <button class="category-btn px-2 pb-1" data-category="technology">Tech</button>
            <button class="category-btn px-2 pb-1" data-category="business">Business</button>
        </nav>

        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-3 gap-10 min-h-[400px]">
            <div class="col-span-full text-center py-20 text-stone-400 italic text-xl">Initializing Gazette...</div>
        </div>

        <div id="pagination-controls" class="flex justify-center items-center gap-6 mt-12 mb-20 border-t border-stone-300 pt-8">
            <button id="prev-btn" class="px-6 py-2 border-2 border-stone-800 font-bold hover:bg-stone-800 hover:text-white transition disabled:opacity-20 disabled:cursor-not-allowed">← Previous</button>
            <span id="page-num" class="font-black text-lg tracking-tighter">PAGE 1</span>
            <button id="next-btn" class="px-6 py-2 border-2 border-stone-800 font-bold hover:bg-stone-800 hover:text-white transition">Next →</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
