<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Global Gazette | Digital Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Source+Serif+4:wght@400;700&display=swap');
        body { font-family: 'Source Serif 4', serif; }
        .newspaper-title { font-family: 'Playfair Display', serif; }
        
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 30s linear infinite;
        }
    </style>
</head>
<body class="bg-[#fcfaf5] text-stone-900">

    <div class="bg-red-700 text-white py-2 overflow-hidden border-b border-black">
        <div id="breaking-ticker" class="animate-marquee uppercase font-bold text-sm tracking-widest">
            Loading live dispatches...
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-4 py-6">
        <header class="text-center border-b-4 border-double border-stone-800 pb-2 mb-4">
            <h1 class="newspaper-title text-6xl md:text-8xl font-black uppercase tracking-tighter">THE GAZETTE</h1>
            <div class="flex justify-between mt-4 font-bold text-xs uppercase border-y border-stone-300 py-2 italic">
                <span>Nation // World // Commerce</span>
                <span id="current-date"></span>
                <span>Price: Digital Free</span>
            </div>
        </header>

        <nav class="flex flex-wrap justify-center gap-6 mb-8 border-b border-stone-300 pb-4 font-bold uppercase text-sm tracking-widest">
            <button class="nav-link hover:text-red-700 transition" data-category="general">General</button>
            <button class="nav-link hover:text-red-700 transition" data-category="world">International</button>
            <button class="nav-link hover:text-red-700 transition" data-category="nation">Country</button>
            <button class="nav-link hover:text-red-700 transition" data-category="sports">Sports</button>
            <button class="nav-link hover:text-red-700 transition" data-category="technology">Technology</button>
            <button class="nav-link hover:text-red-700 transition" data-category="business">Business</button>
        </nav>

        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-3 gap-10 min-h-[500px]">
            </div>

        <div class="flex justify-center items-center gap-8 mt-12 mb-20 border-t border-stone-300 pt-8">
            <button id="prev-btn" class="px-8 py-2 border-2 border-stone-800 font-bold hover:bg-stone-800 hover:text-white transition disabled:opacity-20" disabled>PREVIOUS</button>
            <span id="page-num" class="font-black text-xl">PAGE 1</span>
            <button id="next-btn" class="px-8 py-2 border-2 border-stone-800 font-bold hover:bg-stone-800 hover:text-white transition">NEXT</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
